name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile key modules
        run: |
          python -m py_compile \
            qbot_coach.py \
            daily_report.py \
            email_template.py \
            ride_report.py \
            weekly_review.py \
            scripts/qbot_smoke_tests.py

      - name: Run smoke tests
        run: python -m scripts.qbot_smoke_tests

